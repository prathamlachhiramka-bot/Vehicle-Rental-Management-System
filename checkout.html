<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>VoltDrive | Secure Checkout</title>
    <link rel="stylesheet" href="/css/style.css?v=8">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>body { font-family: 'Geist', sans-serif; }</style>
</head>
<body class="checkout-dark-theme min-h-screen flex items-center justify-center py-10 px-4">

    <div class="max-w-5xl w-full">
        <div class="flex justify-between items-center mb-8 px-2">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-blue-600 text-3xl">electric_car</span>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">VoltDrive Checkout</h1>
            </div>
            <button onclick="window.location.href='discovery.html'" class="text-gray-500 font-bold hover:text-gray-900 transition-colors">Cancel & Go Back</button>
        </div>

        <form id="checkoutForm" onsubmit="confirmBooking(event)" class="bg-white rounded-[2rem] shadow-xl border border-gray-100 overflow-hidden flex flex-col lg:flex-row">
            
            <div class="flex-1 p-10 lg:p-12">
                <h2 class="text-2xl font-bold text-gray-900 mb-8">Reservation Details</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Selected Vehicle ID</label>
                        <div class="flex items-center bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
                            <span class="material-symbols-outlined text-gray-400 mr-2 text-[20px]">directions_car</span>
                            <input type="text" id="checkoutVehId" class="bg-transparent border-none p-0 focus:ring-0 text-gray-900 font-bold w-full" readonly>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Primary Driver Name</label>
                            <input type="text" id="driverName" required class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white font-medium shadow-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Pick-up Location</label>
                            <select id="pickupLocation" required class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white font-medium shadow-sm">
                                <option value="Main City Hub">Main City Hub</option>
                                <option value="Airport Terminal">Airport Terminal</option>
                                <option value="Downtown Station">Downtown Station</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Pick-up Date</label>
                            <input type="date" id="pickupDate" required class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white font-medium shadow-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Return Date</label>
                            <input type="date" id="returnDate" required class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white font-medium shadow-sm">
                        </div>
                    </div>

                    <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 flex gap-3 mt-4">
                        <span class="material-symbols-outlined text-blue-600">info</span>
                        <p class="text-sm text-blue-800 font-medium">By confirming this booking, you agree to our terms of service and verify that you possess a valid driver's license.</p>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-96 bg-gray-50 p-10 lg:p-12 border-l border-gray-100 flex flex-col justify-between">
                <div>
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-8">Order Summary</h3>
                    
                    <div class="space-y-4 mb-8 border-b border-gray-200 pb-8">
                        <div class="flex justify-between items-center text-gray-600 font-medium">
                            <span>Daily Rate</span>
                            <span id="summaryDaily">$0.00</span>
                        </div>
                        <div class="flex justify-between items-center text-gray-600 font-medium">
                            <span>Duration</span>
                            <span id="summaryDays">1 Day</span>
                        </div>
                        <div class="flex justify-between items-center text-gray-600 font-medium">
                            <span>Taxes & Fees (18%)</span>
                            <span id="summaryTax">$0.00</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-10">
                        <span class="text-xl font-bold text-gray-900">Total</span>
                        <span id="summaryTotal" class="text-4xl font-black text-blue-600">$0.00</span>
                    </div>
                </div>

                <button type="submit" id="confirmBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-colors shadow-md flex items-center justify-center gap-2 text-lg">
                    <span class="material-symbols-outlined">lock</span>
                    Confirm & Pay
                </button>
            </div>
        </form>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
