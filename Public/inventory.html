<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>VoltDrive | Fleet Inventory</title>
    <link rel="stylesheet" href="css/style.css?v=11">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geist', sans-serif; }
        .nav-link:hover { background-color: #f3f4f6; }
    </style>
</head>
<body class="inventory-dark-theme flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-blue-800 text-3xl">electric_car</span>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">VoltDrive <span class="text-blue-600">Admin</span></h1>
            </div>
            
            <nav class="hidden md:flex items-center gap-8">
                <a href="admin-dashboard.html" class="text-sm font-bold text-gray-500 hover:text-blue-600 transition-colors">Dashboard</a>
                <a href="inventory.html" class="text-sm font-bold text-blue-600 border-b-2 border-blue-600 pb-7 pt-7">Fleet Inventory</a>
                <a href="bookings.html" class="text-sm font-bold text-gray-500 hover:text-blue-600 transition-colors">All Bookings</a>
                <a href="customers.html" class="text-sm font-bold text-gray-500 hover:text-blue-600 transition-colors">Customers</a>
                <a href="reports.html" class="text-sm font-bold text-gray-500 hover:text-blue-600 transition-colors">Reports</a>
            </nav>

            <div class="flex items-center gap-2">
                <button onclick="openMessagesModal()" class="flex items-center gap-2 text-sm font-bold text-gray-600 hover:text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-xl transition-colors">
                    <span class="material-symbols-outlined text-lg">mail</span>
                    Customer Inbox
                </button>

                <button onclick="localStorage.clear(); window.location.href='login.html';" class="flex items-center gap-2 text-sm font-bold text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl transition-colors">
                    <span class="material-symbols-outlined text-lg">logout</span>
                    Logout
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 p-8 lg:p-12 max-w-7xl mx-auto w-full">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Fleet Inventory</h2>
                <p class="text-gray-500 mt-1">Manage your vehicles and add new cars to the system.</p>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] border border-gray-100 p-8 shadow-sm mb-10">
            <h3 class="text-xl font-bold mb-6 text-gray-900">Register New Vehicle</h3>
            <form id="addVehicleForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Vehicle Name</label>
                        <input type="text" id="vehName" required class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white" placeholder="e.g., Tesla Model S">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Vehicle Type</label>
                        <select id="vehType" class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="Luxury Sedan">Luxury Sedan</option>
                            <option value="Sport Utility">Sport Utility (SUV)</option>
                            <option value="Compact">Compact</option>
                            <option value="Truck">Truck</option>
                            <option value="Bike">Bike</option>
                            <option value="Bicycle">Bicycle</option>
                            <option value="Electric Car">Electric Car</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="batteryRangeContainer" class="hidden">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Battery Range</label>
                        <input type="text" id="vehRange" class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white" placeholder="e.g., 400 miles">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Price Per Day ($)</label>
                        <input type="number" id="vehPrice" required step="0.01" class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white" placeholder="150.00">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Image URL</label>
                        <input type="url" id="vehImage" required class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white" placeholder="https://images.unsplash.com/...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Initial Status</label>
                        <select id="vehStatus" class="w-full px-4 py-3 rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="available">Available</option>
                            <option value="maintenance">Maintenance</option>
                            <option value="out of stock">Out of Stock</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="addVehBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md">
                        Add Vehicle
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white border border-gray-100 rounded-[2rem] overflow-hidden shadow-sm">
            <div class="p-6 border-b border-gray-100">
                <h3 class="text-xl font-bold text-gray-900">Current Fleet</h3>
            </div>
            <table class="w-full text-left bg-white">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-4 font-bold text-gray-600 text-sm uppercase tracking-wider">Vehicle</th>
                        <th class="p-4 font-bold text-gray-600 text-sm uppercase tracking-wider">Type</th>
                        <th class="p-4 font-bold text-gray-600 text-sm uppercase tracking-wider">Status</th>
                        <th class="p-4 font-bold text-gray-600 text-sm uppercase tracking-wider">Pieces</th>
                        <th class="p-4 font-bold text-gray-600 text-sm uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody" class="divide-y divide-gray-100 bg-white">
                    <tr>
                        <td colspan="5" class="p-8 text-center text-gray-500">
                            Loading fleet data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="adminMessagesModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-600">mail</span> 
                    Customer Inbox
                </h3>
                <button onclick="closeMessagesModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div id="adminMessagesContainer" class="p-6 overflow-y-auto flex-1 bg-white">
                </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
